<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой простой сайт</title>
    <!-- Подключаем внешний CSS файл -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <!-- Картинка с онлайн-ресурса (можно заменить на свою) -->

             src="https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=600"

        <h1>Добро пожаловать!</h1>

        <p class="description">
            Это пример простого, но стильного сайта.

            а картинка подчёркивает атмосферу страницы.
        </p>

        <a href="#" class="btn">Узнать больше</a>

        <div class="footer-note">
